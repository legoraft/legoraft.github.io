<header>
    <div id="theme" tabindex="0">
        <button class="theme-selector">
            <span class="dot" id="accent"></span>
            <span class="dot" id="foreground"></span>
            <span class="dot" id="surface"></span>
        </button>
        <div class="content">
            <button class="theme-button" theme="classic">Classic</button>
            <button class="theme-button" theme="nord">Nord</button>
        </div>
    </div>
</header>
